# ---------------------------------------------------------------------------
# Amazon Hybrid RecSys - central configuration
# Switch dataset by changing `active_dataset` (no code changes needed).
# ---------------------------------------------------------------------------

# Base URL for the Amazon Reviews 2023 raw files (McAuley Lab).
# Review files live under /review_categories, metadata under /meta_categories.
# If a download 404s, verify the base URL against:
#   https://amazon-reviews-2023.github.io/
amazon_base_url: "https://mcauleylab.ucsd.edu/public_datasets/data/amazon_2023/raw"

raw_dir: "data/raw"
processed_dir: "data/processed"

# Which dataset the pipeline currently operates on.
active_dataset: "video_games"

datasets:
  digital_music:
    category: "Digital_Music"   # extreme sparse/cold-start case study; not a main CF benchmark
    k_core: 2                   # 5-core empties this category; 2-core keeps a tiny sparse core
  movies_and_tv:
    category: "Movies_and_TV"   # candidate second benchmark; validate 5-core survival after fetch
    # k_core omitted -> inherits the global preprocessing.k_core (5)
  video_games:
    category: "Video_Games"     # medium / denser -> good for collaborative filtering
    # k_core omitted -> inherits the global preprocessing.k_core (5)

preprocessing:
  k_core: 5                # keep users & items with >= k interactions
  min_rating_relevant: 4.0 # rating >= this counts as "relevant" for Precision/Recall@K
  test_size: 0.2
  random_seed: 42

evaluation:
  k: 10                    # the K in Precision@K / Recall@K / F1@K

hybrid:
  alpha: 0.5               # weighted hybrid: alpha*CF + (1-alpha)*content

models:
  embedding_model: "ibm-granite/granite-embedding-97m-multilingual-r2"
  embedding_fallback: "sentence-transformers/all-MiniLM-L6-v2"
  embedding_device: "mps"       # Apple Silicon acceleration; use "cpu" only as fallback
  embedding_batch_size: 256     # explicit SentenceTransformer encode batch size
  embedding_max_seq_length: 256 # cap transformer tokens to avoid long-description blowups
  embedding_max_chars: 2000     # truncate long metadata blobs before tokenization
  ranking_num_negatives: 100   # sampled negatives per user for ranking metrics
  ranking_random_seed: 42      # fixed seed -> reproducible sampled ranking
  candidate_cap: 1000          # optional upper bound for candidate sets
